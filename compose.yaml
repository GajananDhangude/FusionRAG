services:
  # renamed from 'server' to 'backend'
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env

  # renamed from 'server' to 'frontend'
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend
